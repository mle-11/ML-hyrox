    function parseDate(str) { const [y,m,d] = str.split("-").map(Number); return new Date(y,m-1,d); }
    function toDateStr(date) { return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`; }
    function addDays(date, n) { const d = new Date(date); d.setDate(d.getDate()+n); return d; }

    function buildSessionMap() {
      const map = {};
      runnaWeeks.forEach(w => {
        const monday = parseDate(w.startDate);
        Object.entries(w.sessions).forEach(([off, session]) => {
          const d = addDays(monday, parseInt(off));
          const key = toDateStr(d);
          if (!map[key]) map[key] = [];
          map[key].push({ ...session });
        });
      });
      return map;
    }

    const sessionMap = buildSessionMap();
    const calendarWeeks = (() => {
      const ws = [];
      const tomorrow = addDays(new Date(), 1);
      const tDay = tomorrow.getDay();
      const diffToMon = tDay === 0 ? -6 : 1 - tDay;
      let monday = addDays(tomorrow, diffToMon);
      const planStart = parseDate("2026-05-11");
      if (monday < planStart) monday = planStart;
      const end = parseDate("2026-07-25");
      while (monday <= end) { ws.push(new Date(monday)); monday = addDays(monday, 7); }
      return ws;
    })();

      const persist = (sets) => { setSavedSets(sets); storage.set(key, JSON.stringify({ sets })); };

        if (!newWeight.trim()) return;
        persist([{ weight: newWeight.trim(), date: new Date().toLocaleDateString(), time: new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) }, ...savedSets].slice(0,15));
        setNewWeight("");
      };
      const saveEdit = (i) => { if (!editVal.trim()) return; persist(savedSets.map((s,idx)=>idx===i?{...s,weight:editVal.trim()}:s)); setEditingIdx(null); };
      const deleteSet = (i) => { persist(savedSets.filter((_,idx)=>idx!==i)); if (editingIdx===i) setEditingIdx(null); };

      return (
        <div style={{marginBottom:8}}>
          <button onClick={()=>setOpen(!open)} style={{width:"100%",background:open?"#dce8f8":"#fff",border:`1px solid ${C.border}`,borderRadius:open?"8px 8px 0 0":8,padding:"11px 13px",cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:14,fontWeight:600,color:C.text}}>{ex.name}</span>
              {savedSets.length>0 && <span style={{fontSize:10,background:"#e8f5e9",color:"#2e7d32",borderRadius:4,padding:"2px 6px"}}>✓ {savedSets[0].weight}</span>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:12,color:C.muted}}>{ex.sets}×{ex.reps}</span>
              <span style={{fontSize:11,color:"#bbb"}}>{open?"∧":"∨"}</span>
            </div>
          </button>
          {open && (
            <div style={{background:"#dce8f8",borderLeft:"3px solid #1565c0",border:"1px solid #90caf9",borderTop:"none",borderRadius:"0 0 8px 8px",padding:"11px 13px"}}>
              <p style={{margin:"0 0 10px",fontSize:13,color:"#333",lineHeight:1.6}}>{ex.notes}</p>
              <a href={ex.youtube} target="_blank" rel="noopener noreferrer" style={{display:"inline-block",background:"#cc0000",color:"#fff",borderRadius:6,padding:"5px 12px",fontSize:12,marginBottom:10,textDecoration:"none"}}>▶ YouTube</a>
              <div style={{background:"#fff",borderRadius:8,padding:"11px",border:"1px solid #90caf9"}}>
                <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:1,color:"#1565c0",marginBottom:8,fontWeight:700}}>Log Weight</div>
                <div style={{display:"flex",gap:8,marginBottom:10}}>
                  <input type="text" value={newWeight} onChange={e=>setNewWeight(e.target.value)} onKeyDown={e=>e.key==="Enter"&&logSet()} placeholder="e.g. 80kg or BW" style={{flex:1,padding:"7px 10px",border:"1px solid #90caf9",borderRadius:6,fontSize:13,fontFamily:"Georgia,serif"}} />
                  <button onClick={logSet} style={{background:"#1565c0",color:"#fff",border:"none",borderRadius:6,padding:"7px 14px",fontSize:13,cursor:"pointer",fontWeight:600}}>Log</button>
                </div>
                {savedSets.length>0 && (
                  <div>
                    <div style={{fontSize:11,color:C.muted,marginBottom:5}}>Session log:</div>
                    {savedSets.map((s,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 0",borderBottom:"1px solid #e3f2fd"}}>
                        {editingIdx===i ? (
                          <>
                            <input autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveEdit(i);if(e.key==="Escape")setEditingIdx(null);}} style={{flex:1,padding:"4px 8px",border:"1.5px solid #1565c0",borderRadius:5,fontSize:13,fontFamily:"Georgia,serif"}} />
                            <button onClick={()=>saveEdit(i)} style={{background:"#1565c0",color:"#fff",border:"none",borderRadius:5,padding:"4px 9px",fontSize:12,cursor:"pointer"}}>Save</button>
                            <button onClick={()=>setEditingIdx(null)} style={{background:"none",border:"none",fontSize:13,color:C.muted,cursor:"pointer"}}>✕</button>
                          </>
                        ) : (
                          <>
                            <span style={{fontWeight:600,color:"#1565c0",fontSize:13,flex:1}}>{s.weight}</span>
                            <span style={{fontSize:10,color:"#bbb"}}>{s.date} {s.time}</span>
                            <button onClick={()=>{setEditingIdx(i);setEditVal(s.weight);}} style={{background:"none",border:"none",fontSize:14,cursor:"pointer",padding:"0 3px"}}>✏️</button>
                            <button onClick={()=>deleteSet(i)} style={{background:"none",border:"none",fontSize:14,cursor:"pointer",padding:"0 3px"}}>🗑️</button>
                          </>
                        )}

            </div>
          )}
        </div>
      );

    function DayCell({ date, sessions, milestone, dayType, isToday, isPast, onNavigate, completed, onToggleComplete }) {
      const hasContent = sessions.length>0||milestone||dayType;
      const isWorkout = !!dayType || sessions.length>0;

      let bg="#fff", border=`1px solid ${C.border}`;
      if (completed) { bg="#e8e8e4"; border="1px solid #c0bdb5"; }
      else if (milestone) { bg=C.milestone.bg; border=`1px solid ${C.milestone.border}`; }
      else if (dayType==="hyrox") { bg=C.hyrox.bg; border=`1px solid ${C.hyrox.border}`; }
      else if (dayType==="liftA"||dayType==="liftB") { bg=C.lift.bg; border=`1px solid ${C.lift.border}`; }
      else if (dayType==="interval") { bg=C.interval.bg; border=`1px solid ${C.interval.border}`; }
      else if (dayType==="sunday") { bg=C.sunday.bg; border=`1px solid ${C.sunday.border}`; }
      else if (sessions.length>0) { const t=sessions[0].type; bg=t==="run"?C.run.bg:C.walkrun.bg; border=`1px solid ${t==="run"?C.run.border:C.walkrun.border}`; }
      if (isToday&&!completed) border="2px solid #2c5f2e";

      const handleTap = () => {
        if (!hasContent||completed) return;
        if (dayType==="hyrox") { onNavigate("hyrox"); return; }
        if (dayType==="liftA") { onNavigate("liftA"); return; }
        if (dayType==="liftB") { onNavigate("liftB"); return; }
        if (dayType==="interval") { onNavigate("interval"); return; }
        if (dayType==="sunday") { onNavigate("sunday"); return; }
      };

      const handleCheck = (e) => { e.stopPropagation(); if (!isWorkout) return; onToggleComplete(); };

      const labelMap = { hyrox:"HYROX", liftA:"Lift A", liftB:"Lift B", interval:"Intervals", sunday:"Recovery" };
      const colorMap = { hyrox:C.hyrox.text, liftA:C.lift.text, liftB:C.lift.text, interval:C.interval.text, sunday:C.sunday.text };

      return (
        <div onClick={handleTap} style={{background:bg,border,borderRadius:7,padding:"5px 6px",height:"100%",overflow:"hidden",cursor:hasContent&&!completed?"pointer":"default",opacity:isPast&&!completed&&!hasContent?0.3:isPast&&!completed?0.5:1}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{fontSize:11,fontWeight:isToday&&!completed?700:400,color:completed?"#888":isToday?"#2c5f2e":C.muted}}>{date.getDate()}</div>
            {isWorkout && (
              <button onClick={handleCheck} style={{background:completed?"#888":"#fff",border:`1.5px solid ${completed?"#888":"#c8c8c0"}`,borderRadius:"50%",width:14,height:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0,flexShrink:0}}>
                {completed && <span style={{fontSize:9,color:"#fff",lineHeight:1,fontWeight:700}}>✓</span>}
              </button>
            )}
          </div>
          {completed ? (
            <div style={{marginTop:2}}>
              <div style={{fontSize:9,fontWeight:700,color:"#888"}}>Done ✓</div>
              {dayType && <div style={{fontSize:7,color:"#aaa"}}>{labelMap[dayType]}</div>}
            </div>
          ) : (
            <>
              {milestone && <div style={{fontSize:8,fontWeight:700,color:C.milestone.text,lineHeight:1.25}}>{milestone.label}</div>}
              {dayType && <div style={{fontSize:8,fontWeight:700,color:colorMap[dayType],lineHeight:1.25}}>{labelMap[dayType]}</div>}
              {sessions.map((s,i)=>(
                <div key={i} style={{fontSize:8,color:s.type==="run"?C.run.text:C.walkrun.text,fontWeight:600,lineHeight:1.25,marginTop:1}}>
                  {s.type==="run"?"Run":"R/W"} {s.km?`${s.km}km`:s.label.substring(0,8)}
                </div>
              ))}
            </>
          )}
        </div>
      );
    }

    function CalendarView({ onNavigate }) {
      const today = new Date();
      const todayStr = toDateStr(today);
      const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const [completed, setCompleted] = useState(() => {
        const r = storage.get("completed-days");
        try { return r ? JSON.parse(r.value) : {}; } catch { return {}; }
      });
      const toggleComplete = (dateStr) => {
        const next = { ...completed, [dateStr]: !completed[dateStr] };
        if (!next[dateStr]) delete next[dateStr];
        setCompleted(next);
        storage.set("completed-days", JSON.stringify(next));
      };
      // 0=Mon,1=Tue,2=Wed,3=Thu,4=Fri,5=Sat,6=Sun
      const getDayType = (off) => {
        if (off===0||off===4) return "liftA";
        if (off===1||off===3) return "interval";
        if (off===2)          return "liftB";
        if (off===5)          return "hyrox";
        if (off===6)          return "sunday";
        return null;
      };
      return (
        <div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
            {[
              {bg:C.run.bg,border:C.run.border,text:C.run.text,label:"Run"},
              {bg:C.walkrun.bg,border:C.walkrun.border,text:C.walkrun.text,label:"Walk/Run"},
              {bg:C.lift.bg,border:C.lift.border,text:C.lift.text,label:"Lift"},
              {bg:C.interval.bg,border:C.interval.border,text:C.interval.text,label:"Intervals"},
              {bg:C.hyrox.bg,border:C.hyrox.border,text:C.hyrox.text,label:"HYROX"},
              {bg:C.sunday.bg,border:C.sunday.border,text:C.sunday.text,label:"Recovery"},
            ].map((l,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:4}}>
                <div style={{width:9,height:9,background:l.bg,border:`1px solid ${l.border}`,borderRadius:2}} />
                <span style={{fontSize:10,color:l.text}}>{l.label}</span>
              </div>
            ))}
          </div>
          <div style={{fontSize:10,color:C.muted,marginBottom:10,fontStyle:"italic"}}>Tap any workout day to jump to that tab</div>
          <div className="sticky-days" style={{display:"grid",gridTemplateColumns:"repeat(7, 1fr)",gap:3,marginBottom:4}}>
            {DAY_LABELS.map(d=>(
              <div key={d} style={{textAlign:"center",fontSize:9,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>{d}</div>
            ))}
          </div>
          {calendarWeeks.map((monday,wi)=>{
            const mondayStr = toDateStr(monday);
            const runnaW = runnaWeeks.find(w=>w.startDate===mondayStr);
            const showMonth = wi===0 || monday.getMonth() !== addDays(monday,-7).getMonth();
            return (
              <div key={wi} style={{marginBottom:4}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                  {showMonth ? <div style={{fontSize:9,fontWeight:700,color:C.text,textTransform:"uppercase",letterSpacing:1}}>{months[monday.getMonth()]} {monday.getFullYear()}</div> : <div/>}
                  {runnaW && <div style={{fontSize:8,color:C.muted,letterSpacing:0.5,textTransform:"uppercase"}}>Runna Wk {runnaW.week}</div>}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(7, 1fr)",gridAutoRows:"62px",gap:3}}>
                  {[0,1,2,3,4,5,6].map(off=>{
                    const date = addDays(monday,off);
                    const dateStr = toDateStr(date);
                    const sessions = sessionMap[dateStr]||[];
                    const milestone = MILESTONES[dateStr]||null;
                    const dayType = getDayType(off);
                    const isPast = date < today && dateStr !== todayStr;
                    return (
                      <DayCell key={off} date={date} sessions={sessions} milestone={milestone} dayType={dayType} isToday={dateStr===todayStr} isPast={isPast} onNavigate={onNavigate} completed={!!completed[dateStr]} onToggleComplete={()=>toggleComplete(dateStr)} />
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function App() {
      const [activeTab, setActiveTab] = useState("calendar");
      const tabs = [
        {id:"calendar", label:"Cal"},
        {id:"liftA",    label:"Lift A"},
        {id:"liftB",    label:"Lift B"},
        {id:"interval", label:"Tue/Thu"},
        {id:"hyrox",    label:"Sat"},
        {id:"sunday",   label:"Sun"},
      ];
      return (
        <div style={{fontFamily:"Georgia,serif",background:C.bg,minHeight:"100vh",padding:"20px 13px",maxWidth:640,margin:"0 auto"}}>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:10,letterSpacing:3,textTransform:"uppercase",color:C.muted,marginBottom:3}}>Pre-Canada Training Block</div>
            <h1 style={{fontSize:20,fontWeight:700,margin:0,color:C.text}}>7 Days · Engine First</h1>
            <p style={{fontSize:11,color:C.muted,margin:"4px 0 8px",fontStyle:"italic"}}>Runna · Jul 2 Canada · Jul 25 SF 5K · Sep HYROX SLC</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,fontSize:9,textAlign:"center"}}>
              {[
                {day:"Mon",label:"Lift A",color:C.lift},
                {day:"Tue",label:"Intervals",color:C.interval},
                {day:"Wed",label:"Lift B",color:C.lift},
                {day:"Thu",label:"Intervals",color:C.interval},
                {day:"Fri",label:"Lift A",color:C.lift},
                {day:"Sat",label:"HYROX",color:C.hyrox},
                {day:"Sun",label:"Recovery",color:C.sunday},
              ].map((d,i)=>(
                <div key={i} style={{background:d.color.bg,border:`1px solid ${d.color.border}`,borderRadius:5,padding:"5px 2px"}}>
                  <div style={{fontWeight:700,color:d.color.text,marginBottom:1}}>{d.day}</div>
                  <div style={{color:d.color.text,opacity:0.8,fontSize:8,lineHeight:1.2}}>{d.label}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:4,marginBottom:16}}>
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{padding:"8px 2px",border:`1.5px solid ${C.text}`,borderRadius:7,background:activeTab===t.id?C.text:"#fff",color:activeTab===t.id?"#fff":C.text,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"Georgia,serif"}}>
                {t.label}
              </button>
            ))}
          </div>
          {activeTab==="calendar"  && <CalendarView onNavigate={setActiveTab} />}
          {activeTab==="liftA"     && <LiftView day={liftA} />}
          {activeTab==="liftB"     && <LiftView day={liftB} />}
          {activeTab==="interval"  && <IntervalView />}
          {activeTab==="hyrox"     && <HyroxView />}
          {activeTab==="sunday"    && <SundayView />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
