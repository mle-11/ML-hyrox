      [s("AM", "run", "16km Long Run"), s("PM", "upper", "Optional light upper body")],
      [s("AM", "leg", "Heavy leg strength"), s("PM", "zwiftEasy", "30-45min easy spin (Zwift)")],
      [s("AM", "run", "6.5km Half Easy, Half Tempo"), s("PM", "upper"), s("PM", "zwiftEasy", "20-30min optional easy spin")],
      [s("AM", "full", "Full-body strength"), s("PM", "zwiftBike", "60min bike-focus ride (Zwift)")],
      [s("AM", "run", "7.4km 400s into 200s"), s("PM", "upper")],
      [s("AM", "legLight", "Secondary leg day — hypertrophy focus"), s("PM", "zwiftBike", "75min moderate Zwift ride")],
      [s("AM", "run", "6km Easy Run"), s("PM", "zwiftEasy", "30-45min active recovery spin (Zwift)")]
    ]),
    weekP2("2026-10-12", 12, [
      [s("AM", "run", "14km Hilly Progressive Repeat Long Run"), s("PM", "upper", "Optional light upper body")],
      [s("AM", "leg", "Heavy leg strength"), s("PM", "zwiftEasy", "30-45min easy spin (Zwift)")],
      [s("AM", "full", "Full-body strength"), s("PM", "zwiftBike", "60min bike-focus ride (Zwift)")],
      [s("AM", "run", "6km Tempo 3km"), s("PM", "upper"), s("PM", "zwiftEasy", "20-30min optional easy spin")],
      [s("AM", "run", "7km Easy Run"), s("PM", "zwiftEasy", "20-30min optional easy spin")],
      [s("AM", "legLight", "Secondary leg day — hypertrophy focus"), s("PM", "zwiftBike", "75min moderate Zwift ride")],
      [s("AM", "run", "5km Easy Run"), s("PM", "zwiftEasy", "30-45min active recovery spin (Zwift)")]
    ]),
    weekP2("2026-10-19", 13, [
      [s("AM", "run", "12km Race Practice Long Run"), s("PM", "off")],
      [s("AM", "leg", "Light leg strength (50% cut)"), s("PM", "zwiftEasy", "30-45min easy spin (Zwift)")],
      [s("PM", "zwiftEasy", "30min easy spin (Zwift)")],
      [s("AM", "run", "5km Broken Miles"), s("PM", "off")],
      [s("AM", "run", "6.5km Easy Run"), s("PM", "off")],
      [s("PM", "zwiftEasy", "45min easy-moderate ride (Zwift)")],
      [s("AM", "run", "5.5km Easy Run"), s("PM", "zwiftEasy", "20-30min optional easy spin")]
    ]),
    { label: "Week 14 — Race Week", days: [
      day(0, "2026-10-26", [s("AM", "rest", "Full rest")]),
      day(1, "2026-10-26", [s("PM", "zwiftEasy", "20min easy spin (optional)")]),
      day(2, "2026-10-26", [s("AM", "run", "5.5km Race Pace Practice K's"), s("PM", "off")]),
      day(3, "2026-10-26", [s("AM", "run", "5km Easy Run"), s("PM", "off")]),
      day(4, "2026-10-26", [s("AM", "rest", "Full rest")]),
      day(5, "2026-10-26", [s("AM", "rest", "Light stretching")]),
      day(6, "2026-10-26", [s("AM", "race", "GOLDEN GATE HALF MARATHON")])
    ]}
  ];

  var PHASES = [
    { key: "p0", title: "5K Prep", sub: "Jul 12 – Jul 26", weeks: [phase0Week9, phase0Week10, phase0Week11] },
    { key: "p1", title: "HYROX Prep", sub: "Jul 27 – Sep 18", weeks: phase1Weeks },
    { key: "p2", title: "Half Marathon Build", sub: "Sep 21 – Nov 1", weeks: phase2Weeks }
  ];
  var RACES = [
    { date: "2026-07-30", name: "Your First 3.1mi Run" },
    { date: "2026-09-18", name: "HYROX — Salt Lake City" },
    { date: "2026-11-01", name: "Golden Gate Half Marathon" }
  ];

  var STORE_DONE = "race-tracker-done";
  var STORE_WEIGHTS = "race-tracker-weights";
  function loadJSON(key) {
    try {
      var raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : {};
    } catch (e) { return {}; }
  }
  function saveJSON(key, obj) {
    try { localStorage.setItem(key, JSON.stringify(obj)); } catch (e) { /* private mode etc — fail silently */ }
  }

  var state = {
    activePhase: 0,
    doneMap: loadJSON(STORE_DONE),
    weights: loadJSON(STORE_WEIGHTS),
    openWeeks: {},
    expanded: {}
  };

  function esc(str) {
    var d = document.createElement("div");
    d.textContent = String(str);
    return d.innerHTML;
  }

  function flattenGroups(groups) {
    var flat = [];
    groups.forEach(function (g) { g.items.forEach(function (it) { flat.push(it); }); });
    return flat;
  }

  function renderSession(sess, dayDate, sessionIdx) {
    var meta = TYPE_META[sess.type];
    var iconHTML = typeIconSVG(sess.type, 13, meta.color);

    if (!sess.exerciseGroups) {
      var key = dayDate + "__" + sessionIdx;
      var done = !!state.doneMap[key];
      return (
        '<button class="w-full flex items-center gap-2 rounded-md px-2.5 py-2 text-left transition-colors" ' +
        'data-action="toggle-session" data-key="' + key + '" ' +
        'style="background-color:' + (done ? meta.color + "22" : C.surfaceAlt) + ';border:1px solid ' + (done ? meta.color : C.line) + ';">' +
        '<span style="flex-shrink:0;">' + (done ? checkSVG(14, meta.color) : circleSVG(13, C.textMute)) + '</span>' +
        '<span style="flex-shrink:0;">' + iconHTML + '</span>' +
        '<div class="min-w-0">' +
        '<div class="font-mono fs-10 uppercase tracking-wide" style="color:' + C.textMute + ';">' + sess.time + '</div>' +
        '<div class="font-body fs-12-5 leading-tight" style="color:' + (done ? C.textMute : C.text) + ';text-decoration:' + (done ? "line-through" : "none") + ';">' + esc(sess.title) + '</div>' +
        '</div></button>'
      );
    }

    var flat = flattenGroups(sess.exerciseGroups);
    var expandKey = dayDate + "__" + sessionIdx;
    var isExpanded = !!state.expanded[expandKey];
    var doneCount = 0;
    var idxCounter = -1;
    var groupsHTML = "";

    sess.exerciseGroups.forEach(function (grp) {
      var itemsHTML = "";
      grp.items.forEach(function (ex) {
        idxCounter++;
        var i = idxCounter;
        var exKey = dayDate + "__" + sessionIdx + "__ex" + i;
        var exDone = !!state.doneMap[exKey];
        if (exDone) doneCount++;
        var weightField = "";
        if (ex.weighted) {
          var savedVal = state.weights[ex.name] || "";
          weightField =
            '<input type="text" inputmode="decimal" data-weight-name="' + esc(ex.name) + '" value="' + esc(savedVal) + '" placeholder="lbs" ' +
            'class="font-mono fs-11 w-52 rounded-md px-1.5 py-1 text-right" ' +
            'style="background-color:' + C.bg + ';border:1px solid ' + C.line + ';color:' + C.amber + ';flex-shrink:0;" />';
        }
        itemsHTML +=
          '<div class="flex items-center gap-2 py-2" style="border-bottom:1px solid ' + C.line + ';">' +
          '<button data-action="toggle-exercise" data-key="' + exKey + '" style="flex-shrink:0;">' +
          (exDone ? checkSVG(13, meta.color) : circleSVG(12, C.textMute)) + '</button>' +
          '<div class="min-w-0 flex-1">' +
          '<div class="font-body fs-11 leading-snug truncate" style="color:' + (exDone ? C.textMute : C.text) + ';text-decoration:' + (exDone ? "line-through" : "none") + ';">' + esc(ex.name) + '</div>' +
          '<div class="font-mono fs-11" style="color:' + C.textMute + ';">' + esc(ex.sets) + ' × ' + esc(ex.reps) + '</div>' +
          '</div>' + weightField + '</div>';
      });
      var titleHTML = grp.title
        ? '<div class="font-mono fs-9-5 uppercase tracking-wide pt-2.5 pb-1" style="color:' + meta.color + ';">' + esc(grp.title) + '</div>'
        : "";
      groupsHTML += '<div>' + titleHTML + itemsHTML + '</div>';
    });

    var allDone = doneCount === flat.length;
    return (
      '<div class="rounded-md overflow-hidden" style="background-color:' + (allDone ? meta.color + "22" : C.surfaceAlt) + ';border:1px solid ' + (allDone ? meta.color : C.line) + ';">' +
      '<button data-action="toggle-expand" data-key="' + expandKey + '" class="w-full flex items-center gap-2 px-2.5 py-2 text-left">' +
      '<span style="flex-shrink:0;">' + (allDone ? checkSVG(14, meta.color) : circleSVG(13, C.textMute)) + '</span>' +
      '<span style="flex-shrink:0;">' + iconHTML + '</span>' +
      '<div class="min-w-0 flex-1">' +
      '<div class="font-mono fs-10 uppercase tracking-wide" style="color:' + C.textMute + ';">' + sess.time + '</div>' +
      '<div class="font-body fs-12-5 leading-tight" style="color:' + (allDone ? C.textMute : C.text) + ';">' + esc(sess.title) + '</div>' +
      '</div>' +
      '<span class="font-mono fs-10" style="color:' + C.textMute + ';flex-shrink:0;">' + doneCount + '/' + flat.length + '</span>' +
      '<span style="flex-shrink:0;">' + chevronSVG(isExpanded ? "down" : "right", 14, C.textMute) + '</span>' +
      '</button>' +
      (isExpanded ? '<div class="pl-7 pr-2.5 pb-2 flex flex-col" style="border-top:1px solid ' + C.line + ';">' + groupsHTML + '</div>' : "") +
      '</div>'
    );
  }

  function renderDay(dayObj, isToday) {
    var sessionsHTML = dayObj.sessions.map(function (sess, i) {
      return renderSession(sess, dayObj.date, i);
    }).join("");
    return (
      '<div class="grid gap-1.5 py-2 px-3" style="grid-template-columns:40px 1fr;border-bottom:1px solid ' + C.line + ';background-color:' + (isToday ? C.surfaceAlt : "transparent") + ';">' +
      '<div class="flex flex-col items-start justify-center text-left">' +
      '<div class="font-mono fs-10" style="color:' + (isToday ? C.amber : C.textMute) + ';">' + shortDow(dayObj.date).toUpperCase() + '</div>' +
      '<div class="font-display text-sm" style="color:' + (isToday ? C.amber : C.text) + ';">' + new Date(dayObj.date + "T00:00:00").getDate() + '</div>' +
      '</div>' +
      '<div class="flex flex-col gap-1.5">' + sessionsHTML + '</div>' +
      '</div>'
    );
  }

  function renderWeek(week, phaseIdx, weekIdx) {
    var openKey = phaseIdx + "-" + weekIdx;
    var isOpen = state.openWeeks[openKey];
    if (isOpen === undefined) isOpen = (weekIdx === 0);
    var today = todayISO();
    var daysHTML = isOpen ? week.days.map(function (d) { return renderDay(d, d.date === today); }).join("") : "";
    return (
      '<div class="mb-3 rounded-lg overflow-hidden" style="border:1px solid ' + C.line + ';">' +
      '<button data-action="toggle-week" data-key="' + openKey + '" class="w-full flex items-center justify-between px-3 py-2.5" style="background-color:' + C.surface + ';">' +
      '<span class="font-display fs-15" style="color:' + C.text + ';">' + esc(week.label) + '</span>' +
      '<span style="flex-shrink:0;">' + chevronSVG(isOpen ? "down" : "right", 16, C.textMute) + '</span>' +
      '</button>' +
      (isOpen ? '<div style="background-color:' + C.bg + ';">' + daysHTML + '</div>' : "") +
      '</div>'
    );
  }

  function renderLegend() {
    var items = ["run", "leg", "hyrox", "hyroxSat", "zwiftBike", "full"];
    var html = items.map(function (k) {
      var m = TYPE_META[k];
      return (
        '<div class="flex items-center gap-1.5">' +
        '<div class="w-2 h-2 rounded-full" style="background-color:' + m.color + ';"></div>' +
        '<span class="font-body fs-11" style="color:' + C.textMute + ';">' + esc(m.label) + '</span>' +
        '</div>'
      );
    }).join("");
    return '<div class="flex flex-wrap gap-x-3 gap-y-1.5 px-1 mb-4">' + html + '</div>';
  }

  function totalSessionsCount() {
    var total = 0;
    PHASES.forEach(function (p) {
      p.weeks.forEach(function (w) {
        w.days.forEach(function (d) {
          d.sessions.forEach(function (sess) {
            total += sess.exerciseGroups ? flattenGroups(sess.exerciseGroups).length : 1;
          });
        });
      });
    });
    return total;
  }

  function render() {
    var root = document.getElementById("root");
    var t = todayISO();
    var nextRace = RACES.filter(function (r) { return r.date >= t; })[0] || RACES[RACES.length - 1];
    var nd = daysUntil(nextRace.date);

    var timelineHTML = RACES.map(function (r, i) {
      var passed = r.date < t;
      var isNext = r.date === nextRace.date;
      var dotSize = isNext ? 10 : 7;
      var dotColor = passed ? C.green : (isNext ? C.amber : C.line);
      var dot = '<div class="rounded-full" style="width:' + dotSize + 'px;height:' + dotSize + 'px;background-color:' + dotColor + ';flex-shrink:0;"></div>';
      var connector = i < RACES.length - 1 ? '<div class="flex-1 h-2px" style="background-color:' + (passed ? C.green : C.line) + ';"></div>' : "";
      return dot + connector;
    }).join("");

    var totalSessions = totalSessionsCount();
    var completedCount = Object.keys(state.doneMap).filter(function (k) { return state.doneMap[k]; }).length;
    var pct = totalSessions ? Math.min(100, (completedCount / totalSessions) * 100) : 0;

    var tabsHTML = PHASES.map(function (p, i) {
      var active = state.activePhase === i;
      return (
        '<button data-action="set-phase" data-key="' + i + '" class="flex-1 rounded-lg px-2 py-2 text-center transition-colors" ' +
        'style="background-color:' + (active ? C.amber : C.surface) + ';border:1px solid ' + (active ? C.amber : C.line) + ';">' +
        '<div class="font-display fs-12 leading-tight" style="color:' + (active ? "#FFFFFF" : C.text) + ';">' + esc(p.title) + '</div>' +
        '<div class="font-mono fs-9 mt-0.5" style="color:' + (active ? "#FFFFFFCC" : C.textMute) + ';">' + esc(p.sub) + '</div>' +
        '</button>'
      );
    }).join("");

    var phase = PHASES[state.activePhase];
    var weeksHTML = phase.weeks.map(function (w, i) { return renderWeek(w, state.activePhase, i); }).join("");

    root.innerHTML =
      '<div class="min-h-screen font-body" style="background-color:' + C.bg + ';">' +
      '<div class="max-w-md mx-auto px-4 pt-6 pb-16">' +

      '<div class="rounded-xl p-4 mb-5 relative overflow-hidden" style="background-color:' + C.surface + ';border:1px solid ' + C.line + ';">' +
      '<div class="font-mono fs-10 uppercase tracking-widest mb-1" style="color:' + C.amber + ';">Next Up</div>' +
      '<div class="flex items-baseline gap-2">' +
      '<span class="font-display" style="font-size:52px;line-height:1;color:' + C.amber + ';">' + (nd >= 0 ? nd : 0) + '</span>' +
      '<span class="font-body text-sm" style="color:' + C.textMute + ';">' + (nd === 0 ? "TODAY" : "days") + '</span>' +
      '</div>' +
      '<div class="font-display text-lg mt-1" style="color:' + C.text + ';">' + esc(nextRace.name) + '</div>' +
      '<div class="flex items-center gap-1.5 mt-4">' + timelineHTML + '</div>' +
      '<div class="flex justify-between mt-1">' +
      '<span class="font-mono fs-9" style="color:' + C.textMute + ';">5K</span>' +
      '<span class="font-mono fs-9" style="color:' + C.textMute + ';">HYROX</span>' +
      '<span class="font-mono fs-9" style="color:' + C.textMute + ';">HALF</span>' +
      '</div></div>' +

      '<div class="flex items-center justify-between mb-4 px-1">' +
      '<span class="font-body fs-12" style="color:' + C.textMute + ';">' + completedCount + ' / ' + totalSessions + ' sessions logged</span>' +
      '<div class="w-24 h-1.5 rounded-full overflow-hidden" style="background-color:' + C.surfaceAlt + ';">' +
      '<div class="h-full" style="width:' + pct + '%;background-color:' + C.amber + ';"></div></div></div>' +

      '<div class="flex gap-1.5 mb-4">' + tabsHTML + '</div>' +

      renderLegend() +

      '<div>' + weeksHTML + '</div>' +

      '<div class="text-center mt-6">' +
      '<span class="font-mono fs-10" style="color:' + C.textMute + ';">Tap any session to check it off — your progress is saved automatically in this browser.</span>' +
      '</div>' +
      '</div></div>';
  }

  document.addEventListener("click", function (e) {
    var el = e.target.closest("[data-action]");
    if (!el) return;
    var action = el.getAttribute("data-action");
    var key = el.getAttribute("data-key");

    if (action === "toggle-session" || action === "toggle-exercise") {
      state.doneMap[key] = !state.doneMap[key];
      saveJSON(STORE_DONE, state.doneMap);
      render();
    } else if (action === "toggle-expand") {
      state.expanded[key] = !state.expanded[key];
      render();
    } else if (action === "toggle-week") {
      var current = state.openWeeks[key];
      if (current === undefined) current = key.split("-")[1] === "0";
      state.openWeeks[key] = !current;
      render();
    } else if (action === "set-phase") {
      state.activePhase = parseInt(key, 10);
      render();
    }
  });

  document.addEventListener(
    "blur",
    function (e) {
      var el = e.target;
      if (el && el.matches && el.matches("[data-weight-name]")) {
        var name = el.getAttribute("data-weight-name");
        var val = el.value;
        if (val && val !== state.weights[name]) {
          state.weights[name] = val;
          saveJSON(STORE_WEIGHTS, state.weights);
        }
      }
    },
    true
  );

  render();
})();
</script>
</body>
</html>
