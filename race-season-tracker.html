// ---------- Date helpers ----------
function addDays(dateStr, n) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}
function shortDow(iso) {
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("en-US", { weekday: "short" });
}
function todayISO() {
  return new Date().toISOString().slice(0, 10);
}
function daysUntil(dateStr) {
  const today = new Date(todayISO() + "T00:00:00");
  const target = new Date(dateStr + "T00:00:00");
  return Math.round((target - today) / 86400000);
}

    [s("AM", "full", "Full-body strength"), s("PM", "zwiftBike", "60min bike-focus ride (Zwift)")],
    [s("AM", "run", "7.4km 400s into 200s"), s("PM", "upper")],
    [s("AM", "legLight", "Secondary leg day — hypertrophy focus"), s("PM", "zwiftBike", "75min moderate Zwift ride")],
    [s("AM", "run", "6km Easy Run"), s("PM", "zwiftEasy", "30-45min active recovery spin (Zwift)")],
  ]),
  weekP2("2026-10-12", 12, [
    [s("AM", "run", "14km Hilly Progressive Repeat Long Run"), s("PM", "upper", "Optional light upper body")],
    [s("AM", "leg", "Heavy leg strength"), s("PM", "zwiftEasy", "30-45min easy spin (Zwift)")],
    [s("AM", "full", "Full-body strength"), s("PM", "zwiftBike", "60min bike-focus ride (Zwift)")],
    [s("AM", "run", "6km Tempo 3km"), s("PM", "upper"), s("PM", "zwiftEasy", "20-30min optional easy spin")],
    [s("AM", "run", "7km Easy Run"), s("PM", "zwiftEasy", "20-30min optional easy spin")],
    [s("AM", "legLight", "Secondary leg day — hypertrophy focus"), s("PM", "zwiftBike", "75min moderate Zwift ride")],
    [s("AM", "run", "5km Easy Run"), s("PM", "zwiftEasy", "30-45min active recovery spin (Zwift)")],
  ]),
  weekP2("2026-10-19", 13, [
    [s("AM", "run", "12km Race Practice Long Run"), s("PM", "off")],
    [s("AM", "leg", "Light leg strength (50% cut)"), s("PM", "zwiftEasy", "30-45min easy spin (Zwift)")],
    [s("PM", "zwiftEasy", "30min easy spin (Zwift)")],
    [s("AM", "run", "5km Broken Miles"), s("PM", "off")],
    [s("AM", "run", "6.5km Easy Run"), s("PM", "off")],
    [s("PM", "zwiftEasy", "45min easy-moderate ride (Zwift)")],
    [s("AM", "run", "5.5km Easy Run"), s("PM", "zwiftEasy", "20-30min optional easy spin")],
  ]),
  {
    label: "Week 14 — Race Week",
    days: [
      day(0, "2026-10-26", [s("AM", "rest", "Full rest")]),
      day(1, "2026-10-26", [s("PM", "zwiftEasy", "20min easy spin (optional)")]),
      day(2, "2026-10-26", [s("AM", "run", "5.5km Race Pace Practice K's"), s("PM", "off")]),
      day(3, "2026-10-26", [s("AM", "run", "5km Easy Run"), s("PM", "off")]),
      day(4, "2026-10-26", [s("AM", "rest", "Full rest")]),
      day(5, "2026-10-26", [s("AM", "rest", "Light stretching")]),
      day(6, "2026-10-26", [s("AM", "race", "GOLDEN GATE HALF MARATHON")]),
    ],
  },
];

const PHASES = [
  { key: "p0", title: "5K Prep", sub: "Jul 12 – Jul 25", weeks: [phase0Week1, phase0Week2] },
  { key: "p1", title: "HYROX Prep", sub: "Jul 27 – Sep 18", weeks: phase1Weeks },
  { key: "p2", title: "Half Marathon Build", sub: "Sep 21 – Nov 1", weeks: phase2Weeks },
];
const RACES = [
  { date: "2026-07-25", name: "5K" },
  { date: "2026-09-18", name: "HYROX — Salt Lake City" },
  { date: "2026-11-01", name: "Golden Gate Half Marathon" },
];

// ---------- localStorage helpers ----------
// This replaces the Claude-only window.storage API — works anywhere the page is hosted.
const STORE_DONE = "race-tracker-done";
const STORE_WEIGHTS = "race-tracker-weights";
function loadJSON(key) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    return {};
  }
}
function saveJSON(key, obj) {
  try {
    localStorage.setItem(key, JSON.stringify(obj));
  } catch (e) {
    // localStorage unavailable (private browsing, etc.) — fail silently
  }
}

// ---------- Weight Input ----------
function WeightInput({ name, savedValue, onCommit }) {
  const [val, setVal] = useState(savedValue || "");
  useEffect(() => {
    setVal(savedValue || "");
  }, [savedValue]);
  return (
    <input
      type="text"
      inputMode="decimal"
      value={val}
      placeholder="lbs"
      onChange={(e) => setVal(e.target.value)}
      onBlur={() => {
        if (val && val !== savedValue) onCommit(name, val);
      }}
      onClick={(e) => e.stopPropagation()}
      className="font-mono text-[11px] w-[52px] rounded-md px-1.5 py-1 text-right"
      style={{ backgroundColor: C.bg, border: `1px solid ${C.line}`, color: C.amber, flexShrink: 0 }}
    />
  );
}

// ---------- Session Chip ----------
function flattenGroups(groups) {
  const flat = [];
  groups.forEach((g) => g.items.forEach((it) => flat.push(it)));
  return flat;
}
function SessionChip({ session, dayDate, sessionIdx, doneMap, onToggle, weights, onSetWeight }) {
  const meta = TYPE_META[session.type];
  const [expanded, setExpanded] = useState(false);

  if (!session.exerciseGroups) {
    const key = `${dayDate}__${sessionIdx}`;
    const done = !!doneMap[key];
    return (
      <button
        onClick={() => onToggle(key)}
        className="w-full flex items-center gap-2 rounded-md px-2.5 py-2 text-left transition-colors"
        style={{ backgroundColor: done ? meta.color + "22" : C.surfaceAlt, border: `1px solid ${done ? meta.color : C.line}` }}
      >
        <span style={{ fontSize: 14, flexShrink: 0, color: meta.color }}>{done ? "✓" : "○"}</span>
        <Icon type={session.type} />
        <div className="min-w-0">
          <div className="font-mono text-[10px] uppercase tracking-wide" style={{ color: C.textMute }}>{session.time}</div>
          <div className="font-body text-[12.5px] leading-tight" style={{ color: done ? C.textMute : C.text, textDecoration: done ? "line-through" : "none" }}>
            {session.title}
          </div>
        </div>
      </button>
    );
  }

  const flatItems = flattenGroups(session.exerciseGroups);
  const doneCount = flatItems.filter((_, i) => doneMap[`${dayDate}__${sessionIdx}__ex${i}`]).length;
  const allDone = doneCount === flatItems.length;
  let idxCounter = -1;
  return (
    <div className="rounded-md overflow-hidden" style={{ backgroundColor: allDone ? meta.color + "22" : C.surfaceAlt, border: `1px solid ${allDone ? meta.color : C.line}` }}>
      <button onClick={() => setExpanded((e) => !e)} className="w-full flex items-center gap-2 px-2.5 py-2 text-left">
        <span style={{ fontSize: 14, flexShrink: 0, color: meta.color }}>{allDone ? "✓" : "○"}</span>
        <Icon type={session.type} />
        <div className="min-w-0 flex-1">
          <div className="font-mono text-[10px] uppercase tracking-wide" style={{ color: C.textMute }}>{session.time}</div>
          <div className="font-body text-[12.5px] leading-tight" style={{ color: allDone ? C.textMute : C.text }}>{session.title}</div>
        </div>
        <span className="font-mono text-[10px]" style={{ color: C.textMute, flexShrink: 0 }}>{doneCount}/{flatItems.length}</span>
        <span style={{ color: C.textMute, fontSize: 12 }}>{expanded ? "▾" : "▸"}</span>
      </button>
      {expanded && (
        <div className="pl-7 pr-2.5 pb-2 flex flex-col" style={{ borderTop: `1px solid ${C.line}` }}>
          {session.exerciseGroups.map((grp, gi) => (
            <div key={gi}>
              {grp.title && (
                <div className="font-mono text-[9.5px] uppercase tracking-wide pt-2.5 pb-1" style={{ color: meta.color }}>
                  {grp.title}
                </div>
              )}
              {grp.items.map((ex) => {
                idxCounter++;
                const i = idxCounter;
                const exKey = `${dayDate}__${sessionIdx}__ex${i}`;
                const exDone = !!doneMap[exKey];
                return (
                  <div key={i} className="flex items-center gap-2 py-2" style={{ borderBottom: `1px solid ${C.line}` }}>
                    <button onClick={() => onToggle(exKey)} style={{ flexShrink: 0 }}>
                      <span style={{ fontSize: 13, color: meta.color }}>{exDone ? "✓" : "○"}</span>
                    </button>
                    <div className="min-w-0 flex-1">
                      <div className="font-body text-[11px] leading-snug truncate" style={{ color: exDone ? C.textMute : C.text, textDecoration: exDone ? "line-through" : "none" }}>
                        {ex.name}
                      </div>
                      <div className="font-mono text-[11px]" style={{ color: C.textMute }}>{ex.sets} × {ex.reps}</div>
                    </div>
                    {ex.weighted && <WeightInput name={ex.name} savedValue={weights[ex.name]} onCommit={onSetWeight} />}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ---------- Day Row ----------
function DayRow({ dayObj, isToday, doneMap, onToggle, weights, onSetWeight }) {
  return (
    <div
      className="grid gap-1.5 py-2 px-3"
      style={{ gridTemplateColumns: "40px 1fr", borderBottom: `1px solid ${C.line}`, backgroundColor: isToday ? C.surfaceAlt : "transparent" }}
    >
      <div className="flex flex-col items-start justify-center text-left">
        <div className="font-mono text-[10px]" style={{ color: isToday ? C.amber : C.textMute }}>{shortDow(dayObj.date).toUpperCase()}</div>
        <div className="font-display text-sm" style={{ color: isToday ? C.amber : C.text }}>{new Date(dayObj.date + "T00:00:00").getDate()}</div>
      </div>
      <div className="flex flex-col gap-1.5">
        {dayObj.sessions.map((sess, i) => (
          <SessionChip key={`${dayObj.date}__${i}`} session={sess} dayDate={dayObj.date} sessionIdx={i} doneMap={doneMap} onToggle={onToggle} weights={weights} onSetWeight={onSetWeight} />
        ))}
      </div>
    </div>
  );
}

// ---------- Week Block ----------
function WeekBlock({ week, doneMap, onToggle, weights, onSetWeight, defaultOpen }) {
  const [open, setOpen] = useState(defaultOpen);
  const today = todayISO();
  return (
    <div className="mb-3 rounded-lg overflow-hidden" style={{ border: `1px solid ${C.line}` }}>
      <button onClick={() => setOpen((o) => !o)} className="w-full flex items-center justify-between px-3 py-2.5" style={{ backgroundColor: C.surface }}>
        <span className="font-display text-[15px]" style={{ color: C.text }}>{week.label}</span>
        <span style={{ color: C.textMute, fontSize: 14 }}>{open ? "▾" : "▸"}</span>
      </button>
      {open && (
        <div style={{ backgroundColor: C.bg }}>
          {week.days.map((d) => (
            <DayRow key={d.date} dayObj={d} isToday={d.date === today} doneMap={doneMap} onToggle={onToggle} weights={weights} onSetWeight={onSetWeight} />
          ))}
        </div>
      )}
    </div>
  );
}

// ---------- Legend ----------
function Legend() {
  const items = ["run", "leg", "hyrox", "hyroxSat", "zwiftBike", "full"];
  return (
    <div className="flex flex-wrap gap-x-3 gap-y-1.5 px-1 mb-4">
      {items.map((k) => {
        const m = TYPE_META[k];
        return (
          <div key={k} className="flex items-center gap-1.5">
            <div className="w-2 h-2 rounded-full" style={{ backgroundColor: m.color }} />
            <span className="font-body text-[11px]" style={{ color: C.textMute }}>{m.label}</span>
          </div>
        );
      })}
    </div>
  );
}

// ---------- Main App ----------
function App() {
  const [activePhase, setActivePhase] = useState(0);
  const [doneMap, setDoneMap] = useState({});
  const [weights, setWeights] = useState({});
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    setDoneMap(loadJSON(STORE_DONE));
    setWeights(loadJSON(STORE_WEIGHTS));
    setLoaded(true);
  }, []);

  const toggle = (key) => {
    setDoneMap((prev) => {
      const next = { ...prev, [key]: !prev[key] };
      saveJSON(STORE_DONE, next);
      return next;
    });
  };

  const setWeight = (name, val) => {
    setWeights((prev) => {
      const next = { ...prev, [name]: val };
      saveJSON(STORE_WEIGHTS, next);
      return next;
    });
  };

  const totalSessions = useMemo(
    () =>
      PHASES.reduce(
        (sum, p) =>
          sum +
          p.weeks.reduce(
            (s2, w) => s2 + w.days.reduce((s3, d) => s3 + d.sessions.reduce((s4, sess) => s4 + (sess.exerciseGroups ? sess.exerciseGroups.reduce((g, grp) => g + grp.items.length, 0) : 1), 0), 0),
            0
          ),
        0
      ),
    []
  );
  const completedCount = Object.values(doneMap).filter(Boolean).length;

  const nextRace = useMemo(() => {
    const t = todayISO();
    return RACES.find((r) => r.date >= t) || RACES[RACES.length - 1];
  }, []);
  const nd = daysUntil(nextRace.date);
  const phase = PHASES[activePhase];

  return (
    <div className="min-h-screen font-body" style={{ backgroundColor: C.bg }}>
      <div className="max-w-md mx-auto px-4 pt-6 pb-16">
        <div className="rounded-xl p-4 mb-5 relative overflow-hidden" style={{ backgroundColor: C.surface, border: `1px solid ${C.line}` }}>
          <div className="font-mono text-[10px] uppercase tracking-widest mb-1" style={{ color: C.amber }}>Next Up</div>
          <div className="flex items-baseline gap-2">
            <span className="font-display" style={{ fontSize: 52, lineHeight: 1, color: C.amber }}>{nd >= 0 ? nd : 0}</span>
            <span className="font-body text-sm" style={{ color: C.textMute }}>{nd === 0 ? "TODAY" : "days"}</span>
          </div>
          <div className="font-display text-lg mt-1" style={{ color: C.text }}>{nextRace.name}</div>
          <div className="flex items-center gap-1.5 mt-4">
            {RACES.map((r, i) => {
              const passed = r.date < todayISO();
              const isNext = r.date === nextRace.date;
              return (
                <React.Fragment key={r.date}>
                  <div className="rounded-full" style={{ width: isNext ? 10 : 7, height: isNext ? 10 : 7, backgroundColor: passed ? C.green : isNext ? C.amber : C.line, flexShrink: 0 }} />
                  {i < RACES.length - 1 && <div className="flex-1 h-[2px]" style={{ backgroundColor: passed ? C.green : C.line }} />}
                </React.Fragment>
              );
            })}
          </div>
          <div className="flex justify-between mt-1">
            <span className="font-mono text-[9px]" style={{ color: C.textMute }}>5K</span>
            <span className="font-mono text-[9px]" style={{ color: C.textMute }}>HYROX</span>
            <span className="font-mono text-[9px]" style={{ color: C.textMute }}>HALF</span>
          </div>
        </div>

        <div className="flex items-center justify-between mb-4 px-1">
          <span className="font-body text-[12px]" style={{ color: C.textMute }}>{completedCount} / {totalSessions} sessions logged</span>
          <div className="w-24 h-1.5 rounded-full overflow-hidden" style={{ backgroundColor: C.surfaceAlt }}>
            <div className="h-full" style={{ width: `${Math.min(100, (completedCount / totalSessions) * 100)}%`, backgroundColor: C.amber }} />
          </div>
        </div>

        <div className="flex gap-1.5 mb-4">
          {PHASES.map((p, i) => (
            <button
              key={p.key}
              onClick={() => setActivePhase(i)}
              className="flex-1 rounded-lg px-2 py-2 text-center transition-colors"
              style={{ backgroundColor: activePhase === i ? C.amber : C.surface, border: `1px solid ${activePhase === i ? C.amber : C.line}` }}
            >
              <div className="font-display text-[12px] leading-tight" style={{ color: activePhase === i ? "#FFFFFF" : C.text }}>{p.title}</div>
              <div className="font-mono text-[9px] mt-0.5" style={{ color: activePhase === i ? "#FFFFFFCC" : C.textMute }}>{p.sub}</div>
            </button>
          ))}
        </div>

        <Legend />

        {!loaded ? (
          <div className="text-center py-10 font-body text-sm" style={{ color: C.textMute }}>Loading your progress…</div>
        ) : (
          <div>
            {phase.weeks.map((w, i) => (
              <WeekBlock key={w.label} week={w} doneMap={doneMap} onToggle={toggle} weights={weights} onSetWeight={setWeight} defaultOpen={i === 0} />
            ))}
          </div>
        )}

        <div className="text-center mt-6">
          <span className="font-mono text-[10px]" style={{ color: C.textMute }}>Tap any session to check it off — your progress is saved automatically in this browser.</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
